<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SAE23 - Saisie de l'inventaire</title>

<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 30px;
    color: #222;
  }
  h2 { color: #004b8d; margin-bottom: 4px; }
  #subtitle { margin-top: 0; color: #555; }

  table { border-collapse: collapse; width: 100%; }
  th {
    background: #005ea5;
    color: white;
    padding: 10px;
    text-align: left;
  }
  th.num, td.num { text-align: right; }
  td {
    border: 1px solid #ddd;
    padding: 8px;
    vertical-align: middle;
  }
  tr:nth-child(even) { background: #f7f7f7; }

  input[type=number] {
    width: 80px;
    padding: 5px;
    border: 1px solid #bbb;
    border-radius: 3px;
    transition: border-color .2s, box-shadow .2s;
  }
  input.saved-ok    { animation: flash-ok    .8s ease-out; }
  input.saved-error { animation: flash-error .8s ease-out; }
  @keyframes flash-ok {
    from { box-shadow: 0 0 0 3px rgba(40,167,69,.5); border-color: #28a745; }
    to   { box-shadow: none; }
  }
  @keyframes flash-error {
    from { box-shadow: 0 0 0 3px rgba(220,53,69,.5); border-color: #dc3545; }
    to   { box-shadow: none; }
  }

  .message {
    display: none;
    margin: 12px 0;
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 14px;
    line-height: 1.4;
  }
  .message.warn { display: block; background: #fff4e5; border: 1px solid #ffb44d; color: #7a4c00; }
</style>
</head>

<body>

<h2>SAE23 - Saisie de l'inventaire</h2>

<div id="message" class="message"></div>

<table>
  <thead>
    <tr>
      <th>Désignation</th>
      <th class="num">Qté</th>
      <th class="num">Besoin maintien</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
"use strict";

// Logical columns exposed in the widget Creator Panel (Grist column mapping).
// This lets the same widget run on ETK1 / SAE23 / SAE31 despite their
// differing physical column names (Besoin_maintien vs Besoin_de_maintien...).
grist.ready({
  requiredAccess: 'full', // required to write back into the table
  columns: [
    { name: 'Designation', title: 'Désignation',    type: 'Text' },
    { name: 'Qte',         title: 'Qté',            type: 'Numeric' },
    { name: 'Besoin',      title: 'Besoin maintien', type: 'Any' }, // validated as number in JS
  ],
});

const tbody = document.getElementById('tbody');
const messageEl = document.getElementById('message');

let mappings = null; // logical name -> physical colId, needed to write back

function showMessage(text, kind) {
  messageEl.textContent = text || '';
  messageEl.className = 'message' + (kind ? ' ' + kind : '');
  messageEl.style.display = text ? 'block' : 'none';
}

grist.onRecords((records, colMappings) => {
  mappings = colMappings;

  // Returns null while some required column is still unmapped.
  const mapped = grist.mapColumnNames(records);
  if (!mapped) {
    tbody.innerHTML = '';
    showMessage(
      "Ouvrez le panneau de configuration (icône ⚙️ à droite) et associez les "
      + "trois colonnes : « Désignation », « Qté » et « Besoin maintien ».",
      'warn'
    );
    return;
  }
  showMessage('', '');
  render(records, mapped);
});

function render(records, mapped) {
  tbody.innerHTML = '';
  records.forEach((record, i) => {
    const row = mapped[i]; // same order as records
    const tr = document.createElement('tr');

    const tdDesignation = document.createElement('td');
    tdDesignation.textContent = row.Designation ?? '';

    const tdQte = document.createElement('td');
    tdQte.className = 'num';
    tdQte.textContent = row.Qte ?? '';

    const tdBesoin = document.createElement('td');
    tdBesoin.className = 'num';
    const input = document.createElement('input');
    input.type = 'number';
    input.min = '0';
    input.step = '1';
    input.value = (row.Besoin === null || row.Besoin === undefined) ? '' : row.Besoin;
    input.addEventListener('change', () => saveBesoin(record.id, input));
    tdBesoin.appendChild(input);

    tr.append(tdDesignation, tdQte, tdBesoin);
    tbody.appendChild(tr);
  });
}

async function saveBesoin(recordId, input) {
  const besoinColId = mappings && mappings.Besoin;
  if (!besoinColId) return;

  const raw = input.value.trim();
  const value = raw === '' ? null : Number(raw);
  if (raw !== '' && Number.isNaN(value)) {
    flash(input, 'error');
    return;
  }

  try {
    await grist.selectedTable.update({
      id: recordId,
      fields: { [besoinColId]: value },
    });
    flash(input, 'ok');
  } catch (err) {
    console.error(err);
    flash(input, 'error');
    showMessage(
      "Écriture refusée par Grist. La colonne mappée sur « Besoin maintien » est "
      + "probablement une colonne formule (vide). Passez-la en colonne de données : "
      + "clic droit sur l'en-tête de colonne → type « Entier » ou « Numérique », "
      + "et supprimez toute formule.",
      'warn'
    );
  }
}

function flash(el, kind) {
  el.classList.remove('saved-ok', 'saved-error');
  void el.offsetWidth; // force reflow so the animation restarts
  el.classList.add(kind === 'ok' ? 'saved-ok' : 'saved-error');
}
</script>

</body>
</html>
